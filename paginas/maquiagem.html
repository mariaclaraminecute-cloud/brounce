<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquiagens Bronce</title>
    <link rel="stylesheet" href="../estilo/maquiagem.css">
</head>
<body>
    <section class="loja-maquiagem">
  <h2 class="titulo-maquiagem">Maquiagem</h2>

  <div class="grid-maquiagem">
    <div class="card-maquiagem">
      <img src="https://cdn.awsli.com.br/2577/2577879/produto/239381146/bronze-shine1-w66gxd6elj.png" alt="Batom Vermelho">
      <h3>Batom Vermelho</h3>
      <p class="preco-maquiagem">R$ 39,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-maquiagem">
      <img src="../fotos/base.png" alt="Base Líquida">
      <h3>Base Líquida</h3>
      <p class="preco-maquiagem">R$ 59,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-maquiagem">
      <img src="https://epocacosmeticos.vteximg.com.br/arquivos/ids/428675-800-800/paleta-de-sombras-rica-de-marre-by-vult-augissima-5.jpg?v=637542023674230000" alt="Paleta de Sombras">
      <h3>Paleta de Sombras</h3>
      <p class="preco-maquiagem">R$ 79,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-maquiagem">
      <img src="https://oceane.vtexassets.com/arquivos/ids/215849/AP2001231CR164F_caneta_delineadora_de_olhos_preta_eyeliner_real_black_oceane_1.jpg?v=638960473571570000" alt="Delineador Preto">
      <h3>Delineador Preto</h3>
      <p class="preco-maquiagem">R$ 29,90</p>
      <button>Comprar</button>
    </div>
  </div>
</section>

<script src="../js/script.js"></script>
</body>
</html>
