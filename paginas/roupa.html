<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roupas Bronce</title>
    <link rel="stylesheet" href="../estilo/roupa.css">
</head>
<body>
    <section class="loja">

  <h2 class="titulo-loja">Nova Coleção</h2>

  <div class="grid-roupas">

    <div class="card-roupa">
      <img src="https://www.lojastyleme.com.br/cdn/shop/files/S388a45f158154cc2847602bc71bcbf7an.webp?v=1727474422&width=1445" alt="Vestido preto">
      <h3>Vestido Elegance</h3>
      <p class="preco">R$ 189,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-roupa">
      <img src="https://images.tcdn.com.br/img/img_prod/1253091/blazer_de_alfaiataria_1917_2_7809751ab9b498486b9c62d70587d5f1.jpg" alt="Blazer feminino">
      <h3>Blazer Feminino</h3>
      <p class="preco">R$ 249,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-roupa">
      <img src="https://down-br.img.susercontent.com/file/br-11134207-7r98o-m2ra6sgmyo0jf9" alt="Saia Alfaiate">
      <h3>Saia Alfaiate</h3>
      <p class="preco">R$ 219,90</p>
      <button>Comprar</button>
    </div>

    <div class="card-roupa">
      <img src="https://static.riachuelo.com.br/RCHLO/15361187001/portrait/06d0846929d146f14c4783dd2c1960fe6ee42890.jpg?imwidth=400" alt="Conjunto">
      <h3>Conjunto</h3>
      <p class="preco">R$ 279,90</p>
      <button>Comprar</button>
    </div>

  </div>

</section>

<script src="../js/script.js"></script>
</body>
</html>
