<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet" href="../estilo/login.css">

</head>

<body>

  <div class="caixa">

    <h2>Login</h2>

    <form id="formLogin">

      <input 
        type="email" 
        id="email"
        placeholder="Email" 
        required
      >

      <input 
        type="password" 
        id="senha"
        placeholder="Senha" 
        required
      >

      <button type="submit">Entrar</button>

    </form>

    <div class="link">
      Não tem conta?
      <a href="cadastro.html">Cadastrar</a>
    </div>

  </div>

  <script src="../js/script.js"></script>
</body>
</html>
