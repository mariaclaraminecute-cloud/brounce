<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessórios Bronce</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilo/acessorios.css">

</head>
<body>

  <section class="loja-acessorio">
    <h2 class="titulo-acessorio">Acessórios</h2>

    <div class="grid-acessorios">
      <div class="card-acessorio">
        <img src="https://down-br.img.susercontent.com/file/5c784eae215117b0f2db7fcc88d34a16" alt="Colar Elegante">
        <h3>Colar Elegante</h3>
        <p class="preco-acessorio">R$ 79,90</p>
        <button>Comprar</button>
      </div>

      <div class="card-acessorio">
        <img src="https://montecarlo.vtexassets.com/arquivos/ids/342287/NIM029216_2.jpg?v=639051338973600000" alt="Brincos Modernos">
        <h3>Brincos Dourados</h3>
        <p class="preco-acessorio">R$ 49,90</p>
        <button>Comprar</button>
      </div>

      <div class="card-acessorio">
        <img src="https://images.tcdn.com.br/img/img_prod/778992/pulseira_disco_dourada_1271_2_93c155bf8e9b74892898106e612b242b_20230329130841.jpg" alt="Pulseira Chique">
        <h3>Pulseira Chique</h3>
        <p class="preco-acessorio">R$ 59,90</p>
        <button>Comprar</button>
      </div>

      <div class="card-acessorio">
        <img src="https://images.tcdn.com.br/img/img_prod/754784/relogio_feminino_marca_de_luxo_strass_elegante_com_bracelete_1583_1_d02e2c7b9175df6563ad19c6b9a3333a.jpg" alt="Relógio">
        <h3>Relógio</h3>
        <p class="preco-acessorio">R$ 129,90</p>
        <button>Comprar</button>
      </div>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
